    - A — Foundations & History:
      - 1. Introduction & History: ./2026.2/classes/introduction/index.md
      - 2. The ML Landscape: ./2026.2/classes/ml-landscape/index.md
    - B — Working with Data:
      - 3. Exploratory Data Analysis: ./2026.2/classes/eda/index.md
      - 4. Data Preprocessing: ./2026.2/classes/preprocessing/index.md
      - 5. Pipelines: ./2026.2/classes/pipelines/index.md
    - C — Unsupervised Learning & Text:
      - 6. Dimensionality Reduction: ./2026.2/classes/dimensionality-reduction/index.md
      - 7. Clustering: ./2026.2/classes/clustering/index.md
      - 8. Text Representation: ./2026.2/classes/text-representation/index.md
      - 9. Topic Modeling & BERTopic: ./2026.2/classes/topic-modeling-bertopic/index.md
    - D — Regression & Model Evaluation:
      - 10. Linear Regression: ./2026.2/classes/linear-regression/index.md
      - 11. Gradient Descent & Regularization: ./2026.2/classes/gradient-descent-regularization/index.md
      - 12. Validation & Data Leakage: ./2026.2/classes/validation/index.md
      - 13. Model Selection: ./2026.2/classes/model-selection/index.md
    - E — Classification:
      - 14. Classification & Metrics: ./2026.2/classes/classification-metrics/index.md
      - 15. k-Nearest Neighbors: ./2026.2/classes/knn/index.md
      - 16. ROC-AUC & Imbalanced Data: ./2026.2/classes/roc-imbalanced/index.md
      - 17. Logistic Regression: ./2026.2/classes/logistic-regression/index.md
      - 18. Naive Bayes: ./2026.2/classes/naive-bayes/index.md
      - 19. Support Vector Machines: ./2026.2/classes/svm/index.md
    - F — Trees & Ensembles:
      - 20. Decision Trees: ./2026.2/classes/decision-trees/index.md
      - 21. Random Forest: ./2026.2/classes/random-forest/index.md
      - 22. Gradient Boosting: ./2026.2/classes/gradient-boosting/index.md
    - G — Edge Approaches:
      - 23. Neural Networks: ./2026.2/classes/neural-networks/index.md
      - 24. Explainability: ./2026.2/classes/explainability/index.md
      - 25. AutoML: ./2026.2/classes/automl/index.md
      - 26. MLOps: ./2026.2/classes/mlops/index.md
      - 27. The Frontier: ./2026.2/classes/frontier/index.md

  - References: references/index.md
  - Disclaimer: disclaimer/index.md
